services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: moodmeet
      POSTGRES_PASSWORD: moodmeet
      POSTGRES_DB: moodmeet
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./apps/api/src/db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U moodmeet"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  livekit:
    image: livekit/livekit-server:latest
    command: --dev --bind 0.0.0.0
    ports:
      - "7880:7880"   # HTTP/WebSocket
      - "7881:7881"   # TLS
      - "7882:7882/udp" # WebRTC UDP
    environment:
      - "LIVEKIT_KEYS=devkey: devsecret"

volumes:
  postgres_data:
